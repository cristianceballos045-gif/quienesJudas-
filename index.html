<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discípulos: El Traidor</title>

<style>
body {
  background:#111;
  color:white;
  font-family: Arial;
  text-align:center;
  max-width:400px;
  margin:auto;
}

input, select, button {
  margin:8px;
  padding:12px;
  border-radius:10px;
  border:none;
  width:90%;
  font-size:16px;
}

.seleccionado {
  background:green;
  color:white;
}

#cortina, #votacion, #resultado, #ganador {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  padding:20px;
}

.nombreBtn {
  background:#333;
  color:white;
  margin:5px;
  padding:10px;
  border-radius:8px;
  width:80%;
}

li {
  margin:5px;
}

li button {
  width:auto;
  padding:5px 10px;
  margin-left:10px;
  background:red;
  color:white;
}

#resultado, #ganador {
  font-size:28px;
  text-align:center;
}
</style>
</head>

<body>

<h2>Discípulos ✝️</h2>

<h3>Selecciona Testamento</h3>
<button id="btnAntiguo" onclick="seleccionarTestamento('antiguo')">📖 Antiguo</button>
<button id="btnNuevo" onclick="seleccionarTestamento('nuevo')">✝️ Nuevo</button>

<h3>Impostores</h3>
<select onchange="cantidadImpostores = parseInt(this.value)">
  <option value="1">1</option>
  <option value="2">2</option>
  <option value="3">3</option>
</select>

<h3>Agregar jugadores</h3>
<input id="nombre" placeholder="Nombre">
<button onclick="agregar()">Agregar</button>

<ul id="lista"></ul>

<button onclick="iniciar()">Iniciar Juego</button>

<!-- CORTINA -->
<div id="cortina">
  <div id="texto"></div>
  <button onclick="siguiente()">Siguiente</button>
</div>

<!-- VOTACION -->
<div id="votacion">
  <h3>Votación</h3>
  <div id="jugadoresVotar"></div>
  <p id="contador"></p>
</div>

<!-- RESULTADO -->
<div id="resultado">
  <h2 id="resultadoTexto"></h2>
  <button onclick="continuar()">Continuar</button>
</div>

<!-- GANADOR -->
<div id="ganador">
  <h2 id="ganadorTexto"></h2>
  <button onclick="location.reload()">Reiniciar</button>
</div>

<script>

// LISTAS
const antiguo = ["Adán","Noé","Abraham","Moisés","David","Daniel"];
const nuevo = ["Jesús","Pedro","Juan","Mateo","Tomás","Pablo"];

let jugadores = [];
let roles = [];
let turno = 0;

let testamento = null;
let cantidadImpostores = 1;

let votosRestantes = 0;
let vivos = [];

// seleccionar testamento
function seleccionarTestamento(tipo){
  testamento = tipo;
  btnAntiguo.classList.remove("seleccionado");
  btnNuevo.classList.remove("seleccionado");
  if(tipo==="antiguo") btnAntiguo.classList.add("seleccionado");
  else btnNuevo.classList.add("seleccionado");
}

// agregar jugador
function agregar(){
  let n = nombre.value;
  if(n){
    jugadores.push(n);
    actualizarLista();
    nombre.value="";
  }
}

// actualizar lista
function actualizarLista(){
  lista.innerHTML="";
  jugadores.forEach((j,i)=>{
    let li=document.createElement("li");
    li.innerHTML=`${j} <button onclick="eliminar(${i})">❌</button>`;
    lista.appendChild(li);
  });
}

// eliminar jugador
function eliminar(i){
  jugadores.splice(i,1);
  actualizarLista();
}

// iniciar juego
function iniciar(){

  if(!testamento){ alert("Selecciona testamento"); return; }
  if(jugadores.length<3){ alert("Mínimo 3 jugadores"); return; }
  if(cantidadImpostores>=jugadores.length){ alert("Demasiados impostores"); return; }

  let base = testamento==="antiguo" ? [...antiguo] : [...nuevo];
  let personajeComun = base[Math.floor(Math.random()*base.length)];

  roles = jugadores.map(n=>({
    nombre:n,
    rol:"Discípulo",
    personaje:personajeComun,
    vivo:true
  }));

  let indices = roles.map((_,i)=>i);
  indices.sort(()=>Math.random()-0.5);
  let seleccionados = indices.slice(0,cantidadImpostores);

  seleccionados.forEach(i=>{
    roles[i].rol="Judas";
    roles[i].personaje=null;
  });

  vivos=[...roles];

  // 🔥 votos proporcionales
  votosRestantes = jugadores.length;

  turno=0;
  mostrarCortina();
}

// cortina
function mostrarCortina(){
  cortina.style.display="flex";
  texto.innerHTML=`Turno de:<br><b>${roles[turno].nombre}</b><br><br>Ver rol`;
  texto.dataset.mostrado="false";
}

// siguiente
function siguiente(){
  let actual=roles[turno];

  if(texto.dataset.mostrado==="false"){
    texto.innerHTML = actual.rol==="Judas" ? "Judas 😈" : actual.personaje;
    texto.dataset.mostrado="true";
  } else {
    turno++;
    if(turno>=roles.length){
      cortina.style.display="none";
      iniciarVotacion();
      return;
    }
    mostrarCortina();
  }
}

// iniciar votación
function iniciarVotacion(){
  votacion.style.display="flex";
  actualizarVotacion();
}

// actualizar votación
function actualizarVotacion(){
  jugadoresVotar.innerHTML="";
  contador.innerText="Votos restantes: "+votosRestantes;

  vivos.forEach(j=>{
    if(j.vivo){
      let btn=document.createElement("button");
      btn.className="nombreBtn";
      btn.innerText=j.nombre;
      btn.onclick=()=>votar(j);
      jugadoresVotar.appendChild(btn);
    }
  });
}

// votar
function votar(j){

  if(votosRestantes<=0) return;

  votosRestantes--;
  j.vivo=false;

  votacion.style.display="none";
  resultado.style.display="flex";

  resultadoTexto.innerText = j.rol==="Judas"
    ? j.nombre+" ERA Judas 😈"
    : j.nombre+" NO era Judas";

  vivos = vivos.filter(x=>x.vivo);
}

// victoria discípulos
function verificarVictoria(){
  let judas = vivos.filter(j=>j.rol==="Judas").length;
  if(judas===0){
    ganadorTexto.innerText="🎉 Ganaron los discípulos";
    ganador.style.display="flex";
    return true;
  }
  return false;
}

// victoria judas
function verificarVictoriaJudas(){
  let judas = vivos.filter(j=>j.rol==="Judas").length;
  let discipulos = vivos.filter(j=>j.rol==="Discípulo").length;

  if(judas>=discipulos){
    ganadorTexto.innerText="😈 Ganaron los Judas";
    ganador.style.display="flex";
    return true;
  }
  return false;
}

// continuar
function continuar(){

  resultado.style.display="none";

  if(verificarVictoria()) return;
  if(verificarVictoriaJudas()) return;

  if(votosRestantes<=0){
    alert("Fin de votaciones");
    return;
  }

  votacion.style.display="flex";
  actualizarVotacion();
}

</script>

</body>
</html>
